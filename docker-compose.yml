services:
  frontend:
    build:
      context: .
      args:
        # Override to point at a remote backend:
        #   VITE_API_BASE_URL=https://api.mysite.com docker compose up --build
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: product-tracker-front
    container_name: product-tracker-front
    ports:
      - "80:80"
    restart: unless-stopped
